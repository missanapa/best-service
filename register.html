<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Sonik — регистрация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Red+Rose:wght@400&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --container-max: 1280px;
        --container-pad: 24px;
        --text: rgba(255, 255, 255, 0.92);
        --accent: #0aa7f8;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scrollbar-gutter: stable;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-weight: 600;
        background: linear-gradient(180deg, #bfdbfe 0%, #7dd3fc 35%, #38bdf8 70%, #0284c7 100%);
        background-attachment: fixed;
      }

      .aero-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .aero-bg__sky {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: linear-gradient(
          185deg,
          #e0f2fe 0%,
          #93c5fd 22%,
          #60a5fa 48%,
          #38bdf8 78%,
          #0369a1 100%
        );
      }

      .aero-bg__sky::before {
        content: "";
        position: absolute;
        inset: -8% -5%;
        background:
          radial-gradient(ellipse 120% 60% at 50% 0%, rgba(255, 255, 255, 0.5) 0%, transparent 52%),
          radial-gradient(ellipse 52% 28% at 8% 22%, rgba(255, 255, 255, 0.45) 0%, transparent 58%),
          radial-gradient(ellipse 40% 22% at 28% 18%, rgba(255, 255, 255, 0.38) 0%, transparent 56%),
          radial-gradient(ellipse 48% 26% at 52% 20%, rgba(255, 255, 255, 0.42) 0%, transparent 58%),
          radial-gradient(ellipse 44% 24% at 76% 16%, rgba(255, 255, 255, 0.4) 0%, transparent 56%),
          radial-gradient(ellipse 50% 28% at 94% 24%, rgba(255, 255, 255, 0.36) 0%, transparent 58%),
          radial-gradient(ellipse 72% 34% at 18% 52%, rgba(255, 255, 255, 0.22) 0%, transparent 64%),
          radial-gradient(ellipse 68% 32% at 82% 56%, rgba(255, 255, 255, 0.2) 0%, transparent 62%),
          radial-gradient(ellipse 95% 38% at 48% 82%, rgba(255, 255, 255, 0.14) 0%, transparent 68%);
        animation: aero-sky-cloud-drift 85s ease-in-out infinite alternate;
        will-change: transform;
      }

      .aero-bg__sky::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 28% 16% at 50% 8%, rgba(255, 255, 255, 0.85) 0%, transparent 55%),
          radial-gradient(circle at 50% -5%, rgba(255, 255, 255, 0.28) 0%, transparent 38%);
        opacity: 0.85;
        animation: aero-sky-cloud-drift2 110s ease-in-out infinite alternate-reverse;
        will-change: transform;
      }

      @keyframes aero-sky-cloud-drift {
        from {
          transform: translate3d(-2.5%, 0, 0) scale(1.03);
        }
        to {
          transform: translate3d(2.5%, 0, 0) scale(1.03);
        }
      }

      @keyframes aero-sky-cloud-drift2 {
        from {
          transform: translate3d(1.5%, -0.8%, 0);
        }
        to {
          transform: translate3d(-1.5%, 0.6%, 0);
        }
      }

      .aero-bg__fx {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .aero-bg__fx::before {
        content: "";
        position: absolute;
        inset: -25%;
        background:
          radial-gradient(ellipse 45% 38% at 18% 28%, rgba(255, 255, 255, 0.22) 0%, transparent 52%),
          radial-gradient(ellipse 38% 32% at 88% 22%, rgba(186, 230, 253, 0.4) 0%, transparent 55%),
          radial-gradient(ellipse 55% 45% at 50% 95%, rgba(14, 165, 233, 0.18) 0%, transparent 48%),
          radial-gradient(ellipse 30% 28% at 72% 65%, rgba(167, 139, 250, 0.12) 0%, transparent 50%);
        mix-blend-mode: soft-light;
        animation: aero-fx-drift 48s ease-in-out infinite alternate;
        will-change: transform;
      }

      .aero-bg__fx::after {
        content: "";
        position: absolute;
        inset: -50%;
        background: linear-gradient(
          118deg,
          transparent 42%,
          rgba(255, 255, 255, 0.12) 50%,
          transparent 58%
        );
        background-size: 240% 240%;
        animation: aero-fx-shimmer 14s ease-in-out infinite;
        opacity: 0.55;
        mix-blend-mode: overlay;
        will-change: background-position;
      }

      @keyframes aero-fx-drift {
        from {
          transform: translate3d(-3%, -1.5%, 0) rotate(-1deg);
        }
        to {
          transform: translate3d(3%, 1.5%, 0) rotate(1deg);
        }
      }

      @keyframes aero-fx-shimmer {
        0%,
        100% {
          background-position: 0% 40%;
        }
        50% {
          background-position: 100% 60%;
        }
      }

      .aero-bg__bubbles {
        position: absolute;
        inset: 0;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .aero-bubble {
        position: absolute;
        left: var(--x, 50%);
        bottom: var(--b, -12%);
        width: calc(var(--w, 40px) * 4);
        height: calc(var(--w, 40px) * 4);
        border-radius: 50%;
        opacity: 0;
        --op: 0.78;
        background:
          radial-gradient(
            circle at 32% 28%,
            rgba(255, 255, 255, 0.98) 0%,
            rgba(255, 255, 255, 0.35) 18%,
            rgba(125, 211, 252, 0.25) 42%,
            rgba(14, 165, 233, 0.12) 100%
          );
        box-shadow:
          inset -24px -40px 72px rgba(255, 255, 255, 0.55),
          inset 20px 32px 64px rgba(3, 105, 161, 0.22),
          0 24px 112px rgba(14, 165, 233, 0.35),
          0 0 4px rgba(255, 255, 255, 0.85);
        animation: aero-bubble-rise var(--dur, 24s) linear infinite;
        animation-delay: var(--delay, 0s);
        will-change: transform, opacity;
      }

      @keyframes aero-bubble-rise {
        0% {
          transform: translate3d(0, 0, 0) scale(0.75);
          opacity: 0;
        }
        6% {
          opacity: var(--op);
        }
        92% {
          opacity: calc(var(--op) * 0.85);
        }
        100% {
          transform: translate3d(var(--dx, 0px), calc(-100vh - 520px), 0) scale(1.08);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .aero-bg__bubbles {
          display: none;
        }

        .aero-bg__sky::before,
        .aero-bg__sky::after,
        .aero-bg__fx::before,
        .aero-bg__fx::after {
          animation: none;
        }
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100%;
        padding: 56px 0 96px;
        overflow-x: hidden;
      }

      .container {
        width: min(var(--container-max), calc(100% - var(--container-pad) * 2));
        margin: 0 auto;
      }

      /* шапка как на index.html */
      .header {
        height: 81px;
        padding: 16px 24px;
        border-radius: 40px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5) 0%,
          rgba(101, 177, 225, 0.6) 83%,
          rgba(255, 255, 255, 0.47) 100%
        );
        box-shadow:
          0px 0px 0.25px 1.25px rgba(255, 255, 255, 1) inset,
          5px 6px 4px rgba(255, 255, 255, 0.25) inset,
          9px 4px 4px rgba(12, 56, 84, 0.14);
      }

      .brand {
        width: 235px;
        height: 49px;
        position: relative;
        overflow: hidden;
        flex: 0 0 auto;
        display: block;
      }

      .brand__full {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .header__actions {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
      }

      .search {
        width: 397px;
        height: 100%;
        padding: 16px 8px 16px 16px;
        border-radius: 40px;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5) 0%,
          #65b1e1 83%,
          rgba(255, 255, 255, 0.47) 100%
        );
        box-shadow:
          3px 5px 2px -4.75px var(--accent) inset,
          0px 0px 0.25px 1.25px var(--accent) inset,
          0px 4px 4px rgba(12, 56, 84, 0.25);
        outline: 1px solid rgba(255, 255, 255, 1);
        outline-offset: -1px;
      }

      .search__icon {
        width: 24px;
        height: 24px;
        object-fit: contain;
        opacity: 0.95;
        filter: drop-shadow(0 1px 0 rgba(12, 56, 84, 0.25));
      }

      .search__hint {
        font-weight: 600;
        color: rgba(255, 255, 255, 1);
        text-shadow: 0px 4px 4px rgba(12, 56, 84, 0.25);
        user-select: none;
      }

      .iconBtn {
        height: 100%;
        padding: 16px;
        border-radius: 74px;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(101, 177, 225, 0.8) 83%,
          rgba(255, 255, 255, 0.38) 100%
        );
        box-shadow:
          3px 5px 2px -4.75px var(--accent) inset,
          0px 0px 0.25px 1.25px var(--accent) inset,
          0px 4px 4px rgba(12, 56, 84, 0.25);
        outline: 1px solid var(--accent);
        outline-offset: -1px;
        border: 0;
        cursor: pointer;
      }

      a.iconBtn {
        text-decoration: none;
        color: inherit;
      }

      .iconBtn img {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }

      @media (max-width: 900px) {
        .brand {
          width: 180px;
        }
        .search {
          width: 260px;
        }
      }

      .reg-main {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      /* внешняя «стеклянная» панель формы */
      .reg-glass {
        padding: 24px;
        border-radius: 40px;
        max-width: 100%;
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
        background: linear-gradient(
          179deg,
          rgba(255, 255, 255, 0.5) 0%,
          rgba(36, 138, 204, 0.56) 44%,
          rgba(82, 175, 234, 0.58) 75%,
          rgba(255, 255, 255, 0.47) 100%
        );
        box-shadow:
          0px 0px 0.25px 1.25px rgba(255, 255, 255, 0.8) inset,
          5px 6px 4px rgba(255, 255, 255, 0.25) inset,
          6px 8px 4px rgba(12, 56, 84, 0.14);
      }

      .reg-glass__inner {
        width: min(720px, 100%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
      }

      .reg-title {
        margin: 0;
        color: white;
        font-size: 28px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        text-shadow: 0px 4px 4px rgba(12, 56, 84, 0.4);
      }

      .reg-form-block {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .reg-form-fields {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .reg-field-group {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .reg-label {
        margin: 0;
        color: white;
        font-size: 18px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        text-shadow: 0px 4px 4px rgba(12, 56, 84, 0.4);
      }

      .reg-input-wrap {
        align-self: stretch;
        height: 49px;
        padding: 16px 8px 16px 16px;
        border-radius: 40px;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5) 0%,
          rgba(101, 177, 225, 0.2) 83%,
          rgba(255, 255, 255, 0.11) 100%
        );
        box-shadow:
          3px 5px 2px -4.75px #0aa7f8 inset,
          0px 4px 4px rgba(12, 56, 84, 0.25);
        outline: 1px white solid;
        outline-offset: -1px;
      }

      .reg-input-wrap input {
        flex: 1;
        min-width: 0;
        height: 100%;
        border: 0;
        background: transparent;
        color: white;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
        outline: none;
      }

      .reg-input-wrap input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }

      .reg-stack {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .reg-submit {
        align-self: stretch;
        height: 53px;
        padding: 16px 8px 16px 16px;
        border-radius: 40px;
        border: 0;
        cursor: pointer;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5) 0%,
          #65b1e1 83%,
          rgba(255, 255, 255, 0.47) 100%
        );
        box-shadow:
          3px 5px 2px -4.75px #0aa7f8 inset,
          0px 0px 0.25px 1.25px #0aa7f8 inset,
          0px 4px 4px rgba(12, 56, 84, 0.25);
        outline: 1px white solid;
        outline-offset: -1px;
        color: white;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
        text-shadow: 0px 4px 4px rgba(12, 56, 84, 0.4);
      }

      .reg-footer-line {
        margin: 0;
        font-size: 18px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        color: white;
        text-shadow: 0px 4px 4px rgba(12, 56, 84, 0.4);
      }

      .reg-footer-line a {
        color: white;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .reg-footer-line a:hover {
        opacity: 0.92;
      }

      .reg-back {
        display: inline-block;
        margin-top: 24px;
        font-size: 18px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        color: #fff;
        text-shadow: 0px 2px 4px rgba(12, 56, 84, 0.45);
      }

      .reg-error {
        margin: 0 0 8px;
        font-size: 18px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        color: #fecaca;
        text-shadow: 0 1px 2px rgba(12, 56, 84, 0.4);
      }

      @media (max-width: 720px) {
        .page {
          padding: 24px 0 56px;
        }
        .brand {
          width: 48px;
        }
        .search {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="aero-bg" aria-hidden="true">
      <div class="aero-bg__sky"></div>
      <div class="aero-bg__fx"></div>
      <ul class="aero-bg__bubbles">
        <li class="aero-bubble" style="--x: 8%; --w: 52px; --dur: 26s; --delay: -3s; --dx: 35px; --b: -8%"></li>
        <li class="aero-bubble" style="--x: 18%; --w: 28px; --dur: 19s; --delay: -12s; --dx: -22px; --op: 0.65"></li>
        <li class="aero-bubble" style="--x: 26%; --w: 72px; --dur: 32s; --delay: -1s; --dx: 48px; --b: -15%"></li>
        <li class="aero-bubble" style="--x: 38%; --w: 36px; --dur: 21s; --delay: -8s; --dx: -40px"></li>
        <li class="aero-bubble" style="--x: 44%; --w: 96px; --dur: 38s; --delay: -18s; --dx: 18px; --op: 0.55"></li>
        <li class="aero-bubble" style="--x: 55%; --w: 44px; --dur: 23s; --delay: -5s; --dx: 55px"></li>
        <li class="aero-bubble" style="--x: 62%; --w: 22px; --dur: 16s; --delay: -14s; --dx: -15px; --op: 0.6"></li>
        <li class="aero-bubble" style="--x: 71%; --w: 64px; --dur: 29s; --delay: -22s; --dx: -52px; --b: -10%"></li>
        <li class="aero-bubble" style="--x: 78%; --w: 34px; --dur: 20s; --delay: -7s; --dx: 28px"></li>
        <li class="aero-bubble" style="--x: 88%; --w: 58px; --dur: 27s; --delay: -11s; --dx: -30px"></li>
        <li class="aero-bubble" style="--x: 95%; --w: 40px; --dur: 24s; --delay: -16s; --dx: 42px; --op: 0.68"></li>
        <li class="aero-bubble" style="--x: 12%; --w: 18px; --dur: 14s; --delay: -9s; --dx: 20px; --op: 0.5"></li>
        <li class="aero-bubble" style="--x: 33%; --w: 24px; --dur: 17s; --delay: -20s; --dx: -25px; --op: 0.52"></li>
        <li class="aero-bubble" style="--x: 48%; --w: 80px; --dur: 35s; --delay: -4s; --dx: 62px; --op: 0.48"></li>
        <li class="aero-bubble" style="--x: 66%; --w: 30px; --dur: 18s; --delay: -13s; --dx: 12px"></li>
        <li class="aero-bubble" style="--x: 82%; --w: 46px; --dur: 25s; --delay: -25s; --dx: -38px"></li>
        <li class="aero-bubble" style="--x: 3%; --w: 56px; --dur: 31s; --delay: -6s; --dx: 45px; --b: -18%"></li>
        <li class="aero-bubble" style="--x: 92%; --w: 32px; --dur: 22s; --delay: -2s; --dx: -48px"></li>
        <li class="aero-bubble" style="--x: 22%; --w: 14px; --dur: 12s; --delay: -17s; --dx: 8px; --op: 0.45"></li>
        <li class="aero-bubble" style="--x: 58%; --w: 20px; --dur: 15s; --delay: -21s; --dx: -10px; --op: 0.48"></li>
      </ul>
    </div>

    <main class="page">
      <div class="container">
        <header class="header">
          <a class="brand" href="./index.html" aria-label="Sonik — главная">
            <img class="brand__full" src="./logo-sonik-3000.png" alt="Sonik 3000" />
          </a>

          <div class="header__actions">
            <div class="search" role="search" aria-label="Поиск">
              <img class="search__icon" src="./icon-search.png" alt="" aria-hidden="true" />
              <div class="search__hint">Найти что угодно</div>
            </div>

            <a class="iconBtn" id="registerHeaderSignin" href="./signin.html" aria-label="Вход">
              <img src="./icon-personal.png" alt="" aria-hidden="true" />
            </a>
          </div>
        </header>

        <div class="reg-main">
          <div class="reg-glass">
            <div class="reg-glass__inner">
              <h1 class="reg-title">Регистрация</h1>

              <div class="reg-form-block">
                <p class="reg-error" id="registerError" hidden></p>
                <form id="registerForm" class="reg-stack" autocomplete="on" novalidate>
                  <div class="reg-form-fields">
                    <div class="reg-field-group">
                      <p class="reg-label">Имя или псевдоним</p>
                      <div class="reg-input-wrap">
                        <input
                          id="reg-nickname"
                          name="nickname"
                          type="text"
                          placeholder="abonent123"
                          autocomplete="username"
                          required
                        />
                      </div>
                    </div>
                    <div class="reg-field-group">
                      <p class="reg-label">E-mail</p>
                      <div class="reg-input-wrap">
                        <input
                          id="reg-email"
                          name="email"
                          type="email"
                          placeholder="sonya@mail.ru"
                          autocomplete="email"
                          required
                        />
                      </div>
                    </div>
                    <div class="reg-field-group">
                      <p class="reg-label">Пароль</p>
                      <div class="reg-input-wrap">
                        <input
                          id="reg-password"
                          name="password"
                          type="password"
                          placeholder="придумайте пароль"
                          autocomplete="new-password"
                          required
                          minlength="4"
                        />
                      </div>
                    </div>
                  </div>

                  <button class="reg-submit" type="submit">Зарегистрироваться</button>
                </form>

                <p class="reg-footer-line">
                  Есть аккаунт?
                  <a id="registerToSignin" href="./signin.html?return=index.html">Войти</a>
                </p>
              </div>
            </div>
          </div>

          <a class="reg-back" href="./index.html">← На главную Sonik</a>
        </div>
      </div>
    </main>

    <script>
      (() => {
        const REGISTER_KEY = "sonik_registered";
        const EMAIL_KEY = "sonik_user_email";
        const NICK_KEY = "sonik_user_nickname";
        const PASS_KEY = "sonik_user_password";

        function safeReturn(raw) {
          if (!raw || typeof raw !== "string") return "index.html";
          const t = raw.trim();
          if (/^[a-z0-9._-]+\.html$/i.test(t) && !t.includes("..")) return t;
          return "index.html";
        }

        const params = new URLSearchParams(location.search);
        const returnPage = safeReturn(params.get("return"));

        const signinLink = document.getElementById("registerToSignin");
        const signinHref = `./signin.html?return=${encodeURIComponent(returnPage)}`;
        if (signinLink) signinLink.href = signinHref;
        const headerSignin = document.getElementById("registerHeaderSignin");
        if (headerSignin) headerSignin.href = signinHref;

        const form = document.getElementById("registerForm");
        const errEl = document.getElementById("registerError");

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          errEl.hidden = true;
          const nickname = document.getElementById("reg-nickname").value.trim();
          const email = document.getElementById("reg-email").value.trim();
          const password = document.getElementById("reg-password").value;

          if (!nickname || !email || !password) {
            errEl.textContent = "Заполните имя, e-mail и пароль.";
            errEl.hidden = false;
            return;
          }

          if (password.length < 4) {
            errEl.textContent = "Пароль не короче 4 символов.";
            errEl.hidden = false;
            return;
          }

          try {
            localStorage.setItem(REGISTER_KEY, "1");
            localStorage.setItem(EMAIL_KEY, email);
            localStorage.setItem(NICK_KEY, nickname);
            localStorage.setItem(PASS_KEY, password);
          } catch {
            errEl.textContent = "Не удалось сохранить данные в браузере.";
            errEl.hidden = false;
            return;
          }

          location.href = `./${returnPage}`;
        });
      })();
    </script>
  </body>
</html>
